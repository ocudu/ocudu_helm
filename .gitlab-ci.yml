spec:
  inputs:
    ocudu_path:
      type: string
      default: ocudu/ocudu
      description: "OCUDU repository path."
    ocudu_ref:
      type: string
      default: dev
      description: "OCUDU reference branch or tag."
---
include:
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/workflow.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/static.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/gitlab_settings/.gitlab-ci.yml
    inputs:
      ocudu_path: $[[ inputs.ocudu_path ]]
      ocudu_ref: $[[ inputs.ocudu_ref ]]

variables:
  OCUDU_REGISTRY_URI: ${CI_TEMPLATE_REGISTRY_HOST}/$[[ inputs.ocudu_path ]]

stages:
  - ci
  - static
  - child
  - release

headers:
  stage: ci
  extends: .headers

################################################################################
## Images
################################################################################

linuxptp image:
  stage: child
  variables:
    LINUXPTP_VERSION: "v4.4"
    CT_VERSION: "1.1.3"
  rules:
    - if: $ON_MR
      changes:
        paths:
          - images/linuxptp/**/*
    - if: $ON_DEFAULT_BRANCH
      changes:
        paths:
          - images/linuxptp/**/*
        compare_to: refs/tags/latest
  trigger:
    include:
      - local: images/linuxptp/.gitlab-ci.yml
        inputs:
          ocudu_path: $[[ inputs.ocudu_path ]]
          ocudu_ref: $[[ inputs.ocudu_ref ]]
    strategy: depend
  needs: []

rt-tests image:
  stage: child
  variables:
    RT_TESTS_VERSION: "v2.8"
  rules:
    - if: $ON_MR
      changes:
        paths:
          - images/rt-tests/**/*
    - if: $ON_DEFAULT_BRANCH
      changes:
        paths:
          - images/rt-tests/**/*
        compare_to: refs/tags/latest
  trigger:
    include:
      - local: images/rt-tests/.gitlab-ci.yml
        inputs:
          ocudu_path: $[[ inputs.ocudu_path ]]
          ocudu_ref: $[[ inputs.ocudu_ref ]]
    strategy: depend
  needs: []

tuned image:
  stage: child
  variables:
    TUNED_VERSION: "v2.21.0"
    CT_VERSION: "1.0.0"
  rules:
    - if: $ON_MR
      changes:
        paths:
          - images/tuned/**/*
    - if: $ON_DEFAULT_BRANCH
      changes:
        paths:
          - images/tuned/**/*
        compare_to: refs/tags/latest
  trigger:
    include:
      - local: images/tuned/.gitlab-ci.yml
        inputs:
          ocudu_path: $[[ inputs.ocudu_path ]]
          ocudu_ref: $[[ inputs.ocudu_ref ]]
    strategy: depend
  needs: []

################################################################################
## Charts
################################################################################

grafana-deployment chart:
  stage: child
  rules:
    - if: $ON_MR
      changes:
        paths:
          - .gitlab/ci/helm_utils.yml
          - charts/grafana-srsran/**/*
  trigger:
    include: charts/grafana-srsran/.gitlab-ci.yml
    strategy: depend
  needs: []

