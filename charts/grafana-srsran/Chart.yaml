apiVersion: v2
name: grafana-deployment
description: Monitoring stack with Grafana, Telegraf, and InfluxDB3 for srsRAN metrics visualization
kubeVersion: ">= 1.24.0-0"
icon: https://grafana.com/static/img/menu/grafana2.svg
home: https://docs.srsran.com/
sources:
- https://github.com/srsran/srsRAN_Project_helm
keywords:
- grafana
- telegraf
- influxdb
- monitoring
- metrics
- observability
- visualization
- srsran
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: AGPL-3.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "true"
type: application
version: 1.3.0
appVersion: "9.2.10"

dependencies:
  - name: grafana
    repository: "https://grafana.github.io/helm-charts"
    version: "9.2.10"
    alias: grafana
  - name: telegraf
    repository: "https://helm.influxdata.com/"
    version: "1.8.60"
    alias: telegraf
  - name: influxdb3
    repository: "https://srsran.github.io/srsRAN_Project_helm/"
    version: "1.0.0"
    alias: influxdb3
