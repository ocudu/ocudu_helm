# -- Number of pod replicas
# @default -- `1` (single instance per node)
replicaCount: 1

# -- Container image configuration
image:
  # -- Container image repository
  repository: softwareradiosystems/linuxptp
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag
  # @default -- Chart appVersion
  tag: v4.4_1.2.0

# -- Image pull secrets for private registries
# @default -- See values.yaml
imagePullSecrets:
  - name: regcred

# -- Override the name of the chart
# @default -- `linuxptp-chart`
nameOverride: "linuxptp-chart"

# -- Override the full name of resources
# @default -- `linuxptp-chart`
fullnameOverride: "linuxptp-chart"

# -- ConfigMap name overrides for different PTP components
# Allows customization of ConfigMap names for advanced use cases
# @default -- `{}` (use generated names)
configmap:
  # -- ConfigMap name for ptp4l configuration
  linuxptpConfig: { nameOverride: "" }
  # -- ConfigMap name for phc2sys entrypoint script
  phc2sysEntrypoint: { nameOverride: "" }
  # -- ConfigMap name for ts2phc entrypoint script
  ts2phcEntrypoint: { nameOverride: "" }
  # -- ConfigMap name for ts2phc configuration
  ts2phc: { nameOverride: "" }
  # -- ConfigMap name for leap seconds file
  ts2phcLeapfile: { nameOverride: "" }

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Additional service account annotations
  annotations: {}
  # -- Service account name
  name: "srsadmin-gnb"

# -- Additional pod annotations
# @default -- `{}` (no additional annotations)
podAnnotations: {}

# -- Pod-level security context
# @default -- `{}` (no pod security context)
podSecurityContext: {}

# -- Container-level security context
# LinuxPTP requires privileged access for PTP clock management
securityContext:
  # -- Additional capabilities for system operations
  capabilities:
    add: ["SYS_NICE", "NET_ADMIN"]
  # -- Run container in privileged mode (required for PTP)
  privileged: true
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# -- Resource requests and limits
# Example:
# ```yaml
# resources:
#   limits:
#     cpu: 1
#     memory: 500Mi
#   requests:
#     cpu: 1
#     memory: 500Mi
# ```
# @default -- `{}` (no resource constraints)
resources: {}
  # limits:
  #   cpu: 1
  #   memory: 500Mi
  # requests:
  #   cpu: 1
  #   memory: 500Mi

# -- Node selector for pod assignment
# Schedule pods only on nodes with matching labels
# Example:
# ```yaml
# nodeSelector:
#   kubernetes.io/hostname: node1
# ```
# @default -- `{}` (no node selector)
nodeSelector: {}
  # kubernetes.io/hostname: node1

# -- Tolerations for pod assignment
# Allows pods to be scheduled on nodes with matching taints
# Default tolerations allow scheduling on master nodes and critical workloads
tolerations:
  - effect: NoSchedule
    operator: Exists
  - key: CriticalAddonsOnly
    operator: Exists
  - effect: NoExecute
    operator: Exists

# -- Pod affinity configuration for advanced scheduling
# @default -- `{}` (no affinity rules)
affinity: {}

# -- Network interface list for PTP synchronization
# Semicolon-separated list of interface names for ptp4l (LLS-C1 profile)
# Each interface will run a separate ptp4l instance
# Example: "ens3f0np0;ens3f1np1" for dual-interface setup
interfaceNameList: "ens3f1np1"

# -- Startup probe configuration
# Allows time for PTP to establish initial synchronization
startupProbe:
  # -- Enable startup probe
  enabled: true
  # -- Number of failures before giving up
  failureThreshold: 30
  # -- Probe interval in seconds
  periodSeconds: 10

# -- Liveness probe configuration
# Checks if PTP daemon is still running
livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Initial delay before first probe
  initialDelaySeconds: 5
  # -- Probe interval in seconds
  periodSeconds: 5

# -- Readiness probe configuration
# Checks if PTP synchronization is healthy
readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Initial delay before first probe
  initialDelaySeconds: 5
  # -- Probe interval in seconds
  periodSeconds: 5

# -- NTP time synchronization before PTP
# Optional: Sync PHC (PTP Hardware Clock) to NTP time before starting PTP service
# Useful for initial time alignment
ntp:
  # -- Enable NTP synchronization at startup
  enabled: false
  # -- NTP server address
  server: "pool.ntp.org"

# -- PTP configuration parameters
# Based on IEEE 1588-2019 and ITU-T G.8275.x telecom profile
config:
  # -- Dataset comparison method for BMCA (Best Master Clock Algorithm)
  # G.8275.x is the telecom profile for phase/time synchronization
  dataset_comparison: "G.8275.x"
  # -- Local priority for default dataset (0-255)
  # Lower values have higher priority in clock selection
  G.8275.defaultDS.localPriority: "128"
  # -- Maximum steps removed from grandmaster
  # Limits PTP clock hierarchy depth
  maxStepsRemoved: "255"
  # -- Announce message interval (log base 2)
  # -3 = 125ms, -4 = 62.5ms
  logAnnounceInterval: "-3"
  # -- Sync message interval (log base 2)
  # -4 = 62.5ms (typical for 5G)
  logSyncInterval: "-4"
  # -- Delay request message interval (log base 2)
  # -4 = 62.5ms
  logMinDelayReqInterval: "-4"
  # -- Server-only mode (0=slave, 1=master)
  # 0 allows acting as PTP slave
  serverOnly: "0"
  # -- Local priority for port dataset (0-255)
  G.8275.portDS.localPriority: "128"
  # -- Destination MAC address for PTP messages
  # 01:80:C2:00:00:0E is for PTP over L2
  ptp_dst_mac: "01:80:C2:00:00:0E"
  # -- Network transport type
  # L2 = Layer 2 Ethernet (hardware timestamping)
  network_transport: "L2"
  # -- PTP domain number (0-255)
  # 24 is common for telecom applications
  domainNumber: "24"
  
  # -- ts2phc configuration for GNSS synchronization
  # Synchronizes PHC to external time source (GPS/GNSS)
  ts2phc:
    # -- Enable ts2phc daemon
    enabled: false
    # -- Use syslog for logging
    use_syslog: 0
    # -- Verbose output level
    verbose: 1
    # -- Logging level (0-7, 7=most verbose)
    logging_level: 7
    # -- PPS pulse width in nanoseconds
    ts2phc_pulsewidth: 100000000
    # -- GNSS NMEA serial port device
    # For GNSS module providing PPS and NMEA time
    ts2phc_nmea_serialport: /dev/gnss0
    # -- External timestamp polarity
    # rising or falling edge
    ts2phc_extts_polarity: rising
