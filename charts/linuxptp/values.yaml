# ============================================================================
# LinuxPTP Helm Chart Configuration
# ============================================================================
#
# This chart deploys LinuxPTP for IEEE 1588 PTP time synchronization.
# For detailed documentation, see README.md
#
# ⚠️  PoC/Demo Chart - Not Production Ready
# This chart requires hostNetwork: true and privileged: true
# ============================================================================

# -- Number of pod replicas (DaemonSet uses 1 per node)
# @default -- `1`
replicaCount: 1

# -- Container image configuration
image:
  # -- Container image repository
  repository: registry.gitlab.com/ocudu/ocudu_elements/ocudu_helm/linuxptp
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (overrides chart appVersion)
  # @default -- Chart appVersion (`4.4.0`)
  tag: v4.4_2.0.0

# -- Image pull secrets for private registries
# Remove or update if not using a private registry
# @default -- `[]` (no pull secrets)
imagePullSecrets: []
  # - name: regcred

# -- Override the name of the chart
# @default -- `linuxptp-chart`
nameOverride: "linuxptp-chart"

# -- Override the full name of resources
# @default -- `linuxptp-chart`
fullnameOverride: "linuxptp-chart"

# ============================================================================
# Advanced Configuration (rarely needs modification)
# ============================================================================

# -- ConfigMap name overrides for different PTP components
# Leave empty to use auto-generated names (recommended)
# @default -- `{}` (use generated names)
configmap:
  linuxptpConfig: { nameOverride: "" }
  phc2sysEntrypoint: { nameOverride: "" }
  ts2phcEntrypoint: { nameOverride: "" }
  ts2phc: { nameOverride: "" }
  ts2phcLeapfile: { nameOverride: "" }

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Additional service account annotations
  annotations: {}
  # -- Service account name
  name: "srsadmin-gnb"

# -- Additional pod annotations
# @default -- `{}` (no additional annotations)
podAnnotations: {}

# -- Pod-level security context
# @default -- `{}` (no pod security context)
podSecurityContext: {}

# ============================================================================
# Security Context (REQUIRED for PTP - Do not modify)
# ============================================================================

# -- Container-level security context
# ⚠️  REQUIRED: LinuxPTP needs privileged access for PTP Hardware Clock (PHC) access
# Cannot be disabled without breaking PTP functionality
securityContext:
  # -- Additional capabilities for system operations
  capabilities:
    add: ["SYS_NICE", "NET_ADMIN"]
  # -- Run container in privileged mode (required for /dev/ptp* access)
  privileged: true
  # Note: Cannot use readOnlyRootFilesystem due to /var/run requirements

# -- Resource requests and limits
# Example:
# ```yaml
# resources:
#   limits:
#     cpu: 1
#     memory: 500Mi
#   requests:
#     cpu: 1
#     memory: 500Mi
# ```
# @default -- `{}` (no resource constraints)
resources: {}
  # limits:
  #   cpu: 1
  #   memory: 500Mi
  # requests:
  #   cpu: 1
  #   memory: 500Mi

# -- Node selector for pod assignment
# Schedule pods only on nodes with matching labels
# Example:
# ```yaml
# nodeSelector:
#   kubernetes.io/hostname: node1
# ```
# @default -- `{}` (no node selector)
nodeSelector: {}
  # kubernetes.io/hostname: node1

# -- Tolerations for pod assignment
# Allows pods to be scheduled on nodes with matching taints
# Default tolerations allow scheduling on master nodes and critical workloads
tolerations:
  - effect: NoSchedule
    operator: Exists
  - key: CriticalAddonsOnly
    operator: Exists
  - effect: NoExecute
    operator: Exists

# -- Pod affinity configuration for advanced scheduling
# @default -- `{}` (no affinity rules)
affinity: {}

# ============================================================================
# PTP Network Configuration (REQUIRED)
# ============================================================================

# -- Network interface list for PTP synchronization
# ⚠️  REQUIRED: Must be set to your PTP-capable network interface(s)
# 
# Format: Semicolon-separated list of interface names
# Examples:
#   - Single interface: "ens3f0np0"
#   - Dual interface:   "ens3f0np0;ens3f1np1"
#
# Verify interface supports hardware timestamping:
#   ethtool -T <interface> | grep "PTP Hardware Clock"
#
# @default -- `"ens3f1np1"` (update for your environment)
interfaceNameList: "ens3f1np1"

# ============================================================================
# Health Probes
# ============================================================================

# -- Startup probe configuration
# Allows time for PTP to establish initial synchronization (can take 5+ minutes)
startupProbe:
  enabled: true
  failureThreshold: 30  # 30 * 10s = 5 minutes
  periodSeconds: 10

# -- Liveness probe configuration
# Checks if PTP daemon is still running
livenessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5

# -- Readiness probe configuration
# Checks if PTP synchronization is healthy
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5

# ============================================================================
# Optional: NTP Initial Synchronization For Host On Startup 
# ============================================================================

# -- NTP time synchronization before PTP
# Optional: Sync PHC (PTP Hardware Clock) to NTP time before starting PTP
# Useful for cold starts when system time is far from correct time
# @default -- `false` (disabled)
ntp:
  enabled: false
  server: "pool.ntp.org"

# ============================================================================
# PTP Protocol Configuration (IEEE 1588-2019, ITU-T G.8275.x)
# ============================================================================

# -- PTP configuration parameters
# Based on IEEE 1588-2019 and ITU-T G.8275.x telecom profile
# Most users can leave these at default values
# Refer to the official GitHub repo for more info: https://github.com/richardcochran/linuxptp
config:
  dataset_comparison: "G.8275.x"
  G.8275.defaultDS.localPriority: "128"
  maxStepsRemoved: "255"
  logAnnounceInterval: "-3"
  logSyncInterval: "-4"
  logMinDelayReqInterval: "-4"
  serverOnly: "0"
  G.8275.portDS.localPriority: "128"
  ptp_dst_mac: "01:80:C2:00:00:0E"
  network_transport: "L2"
  domainNumber: "24"
  ts2phc:
    enabled: false
    use_syslog: 0
    verbose: 1
    logging_level: 7
    ts2phc_pulsewidth: 100000000
    ts2phc_nmea_serialport: /dev/gnss0
    ts2phc_extts_polarity: rising
