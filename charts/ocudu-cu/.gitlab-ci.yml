include:
  - local: .gitlab/ci/helm_utils.yml

stages:
  - static
  - publish

helm lint:
  extends: .helm lint
  variables:
    CHART_PATH: charts/ocudu-cu

helm version check:
  extends: .helm version check
  variables:
    CHART_PATH: charts/ocudu-cu
    CHART_NAME: ocudu-cu

helm publish-dev:
  extends: .helm publish-dev
  variables:
    CHART_PATH: charts/ocudu-cu
    CHART_NAME: ocudu-cu
  needs:
    - job: helm lint
      optional: true
    - job: helm version check
      optional: true

helm publish-prod:
  extends: .helm publish-prod
  variables:
    CHART_PATH: charts/ocudu-cu
    CHART_NAME: ocudu-cu
