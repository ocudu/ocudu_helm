apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-cu.mainConfigmapName" . }}
data:
  {{- .Values.config | toYaml | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-cu.entrypointConfigmapName" . }}
data:
  entrypoint-ocudu-cu.sh: {{ tpl (.Files.Get "resources/entrypoint.sh") . | quote | default 000 }}
