{{- if (.Values.o1).enable_ocudu_o1 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-cu.o1ConfigmapName" . }}
data:
  {{- .Values.o1Config | toYaml | nindent 2 }}
{{- else }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-cu.mainConfigmapName" . }}
data:
  {{- .Values.config | toYaml | nindent 2 }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-cu.entrypointConfigmapName" . }}
data:
  entrypoint-ocudu-cu.sh: {{ tpl (.Files.Get "resources/entrypoint.sh") . | quote | default 000 }}
