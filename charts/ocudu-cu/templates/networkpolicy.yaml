apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ocudu-cu.fullname" . }}
  labels:
    {{- include "ocudu-cu.labels" . | nindent 4 }}
  annotations:
    description: "Network policy for CU (only effective when hostNetwork: false)"
spec:
  podSelector:
    matchLabels:
      {{- include "ocudu-cu.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    {{- if .Values.networkPolicy.ingress.fiveGCore.enabled }}
    # Allow traffic from 5G core (N2/N3 interfaces)
    - from:
      {{- toYaml .Values.networkPolicy.ingress.fiveGCore.from | nindent 6 }}
      ports:
        - protocol: SCTP
          port: 38412  # N2 interface (NGAP)
        - protocol: UDP
          port: 2152   # N3 interface (GTP-U)
    {{- end }}

    {{- if .Values.networkPolicy.ingress.du.enabled }}
    # Allow traffic from DU (F1-C/F1-U interfaces)
    - from:
      {{- toYaml .Values.networkPolicy.ingress.du.from | nindent 6 }}
      ports:
        - protocol: SCTP
          port: 38472  # F1-C interface (F1AP)
        - protocol: UDP
          port: {{ .Values.f1uService.targetPort }}  # F1-U interface (GTP-U, internal port)
    {{- end }}

    {{- if and .Values.metricsService.enabled .Values.networkPolicy.ingress.monitoring.enabled }}
    # Allow traffic from monitoring systems (Telegraf)
    - from:
      {{- toYaml .Values.networkPolicy.ingress.monitoring.from | nindent 6 }}
      ports:
        - protocol: TCP
          port: {{ .Values.metricsService.port }}
    {{- end }}

    {{- range .Values.networkPolicy.ingress.custom }}
    # Custom ingress rule
    - {{ toYaml . | nindent 6 }}
    {{- end }}

  egress:
    {{- if .Values.networkPolicy.egress.fiveGCore.enabled }}
    # Allow traffic to 5G core (N2/N3)
    - to:
      {{- toYaml .Values.networkPolicy.egress.fiveGCore.to | nindent 6 }}
      ports:
        - protocol: SCTP
          port: 38412  # N2 (NGAP)
        - protocol: UDP
          port: 2152   # N3 (GTP-U)
    {{- end }}

    {{- if .Values.networkPolicy.egress.du.enabled }}
    # Allow traffic to DU (F1-C/F1-U)
    - to:
      {{- toYaml .Values.networkPolicy.egress.du.to | nindent 6 }}
      ports:
        - protocol: SCTP
          port: 38472  # F1-C (F1AP)
        - protocol: UDP
          port: 2152   # F1-U (GTP-U)
    {{- end }}

    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    {{- if .Values.networkPolicy.egress.monitoring.enabled }}
    # Allow traffic to monitoring systems
    - to:
      {{- toYaml .Values.networkPolicy.egress.monitoring.to | nindent 6 }}
      ports:
        - protocol: TCP
          port: 8086  # InfluxDB
    {{- end }}

    {{- range .Values.networkPolicy.egress.custom }}
    # Custom egress rule
    - {{ toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
