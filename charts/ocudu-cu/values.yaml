# -- Container image configuration
image:
  # -- Container image repository
  repository: registry.gitlab.com/ocudu/ocudu/ocudu_nightly_avx512
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag
  # @default -- Chart appVersion
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of resources
fullnameOverride: ""

# -- ConfigMap name overrides
configmap:
  main: { nameOverride: "" }
  entrypoint: { nameOverride: "" }

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- RBAC configuration
rbac:
  create: true
  extraRules: []

# -- Pod Disruption Budget configuration
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow

# -- Additional pod annotations
podAnnotations: {}

# -- Extra labels applied to the Deployment and Pod template
extraLabels: {}

# -- DU liveness probe configuration.
livenessProbe:
  enabled: true
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

# -- DU readiness probe configuration.
readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 30
  successThreshold: 1

# -- Pod-level security context. Runs the container as a non-root user by default.
# @default -- see below
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: true
  privileged: false
  capabilities:
    drop: ["ALL"]
    add:
      - SYS_NICE
      - IPC_LOCK

# -- Resource requests and limits
resources: {}

# -- Network configuration
network:
  # -- Enable host network mode
  # false (default): Uses CNI network (NetworkPolicy supported)
  # true: Uses host network namespace directly (NetworkPolicy NOT supported)
  # @default -- `false`
  hostNetwork: false

# -- Node selector for pod assignment
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations: {}

# -- Pod affinity configuration
affinity: {}

# -- Metrics service configuration
# Exposes CU metrics endpoint for Telegraf collection
metricsService:
  # -- Enable metrics service
  enabled: false
  # -- Enable power consumption metrics via RAPL
  # @default -- `false`
  powercap:
    enabled: false

  # -- Service type (ClusterIP, NodePort, or LoadBalancer)
  # @default -- `ClusterIP`
  type: ClusterIP

  # -- LoadBalancer IP address (optional, when type is LoadBalancer)
  # @default -- `""` (auto-assign)
  loadBalancerIP: ""

  # -- LoadBalancer class (optional, for clusters with multiple LB implementations)
  # @default -- `""` (use default)
  loadBalancerClass: ""

  # -- External traffic policy (Cluster or Local)
  # @default -- `Cluster`
  externalTrafficPolicy: Cluster

  # -- Session affinity (None or ClientIP)
  # @default -- `None`
  sessionAffinity: None

  # -- NodePort (optional, only used when type is NodePort)
  # @default -- `""` (auto-assign)
  nodePort: ""

  # -- Service port (must match the port in cu-config.yml)
  port: 8001

  # -- Target port (container port)
  targetPort: 8001

# -- Service configuration for F1-U interface (DU↔CU-UP GTP-U, hostNetwork=false only)
# When hostNetwork=false, F1-U (UDP:2152) and NGU/N3 (UDP:2152) would collide on the
# same pod IP. This service maps external UDP:2152 to an internal port (default 2151)
# so the ocu binary can bind both on different ports.
# Set cu_up.f1u.bind_port in the config to match f1uService.ports.f1u.targetPort.
f1uService:
  # -- Enable F1-U service (only needed when network.hostNetwork is false)
  enabled: true

  # -- Service type (ClusterIP, NodePort, or LoadBalancer)
  # @default -- `LoadBalancer`
  type: LoadBalancer

  # -- LoadBalancer IP address (optional, cluster-dependent)
  # @default -- `""` (auto-assign)
  loadBalancerIP: ""

  # -- LoadBalancer class (optional, for clusters with multiple LB implementations)
  # @default -- `""` (use default)
  loadBalancerClass: ""

  # -- External traffic policy (Cluster or Local)
  # @default -- `Cluster`
  externalTrafficPolicy: Cluster

  # -- Session affinity (None or ClientIP)
  # @default -- `None`
  sessionAffinity: None

  # -- Port configuration for F1-U interface
  ports:
    # -- F1-U interface (GTP-U - user plane to DU)
    f1u:
      # -- External port (what the DU connects to — standard GTP-U port)
      port: 2152
      # -- Container target port (must match cu_up.f1u.bind_port in the config)
      targetPort: 2151
      # -- NodePort (optional, only used when type is NodePort)
      # @default -- `""` (auto-assign)
      nodePort: ""

# -- Service configuration for N2 and N3 interfaces
service:
  # -- Enable service for N2/N3 interfaces (5GC connectivity)
  enabled: false

  # -- Service type (ClusterIP, NodePort, or LoadBalancer)
  # @default -- `LoadBalancer`
  type: LoadBalancer

  # -- LoadBalancer IP address (optional, cluster-dependent)
  # @default -- `""` (auto-assign)
  loadBalancerIP: ""

  # -- LoadBalancer class (optional, for clusters with multiple LB implementations)
  # @default -- `""` (use default)
  loadBalancerClass: ""

  # -- External traffic policy (Cluster or Local)
  # @default -- `Cluster`
  externalTrafficPolicy: Cluster

  # -- Session affinity (None or ClientIP)
  # @default -- `None`
  sessionAffinity: None

  # -- Port configuration for N2 and N3 interfaces
  ports:
    # -- N2 interface (NGAP - control plane to AMF)
    n2:
      # -- Enable N2 port
      enabled: true
      # -- External port
      port: 38412
      # -- Container target port
      # @default -- Same as port
      targetPort: 38412
      # -- Protocol (SCTP for NGAP)
      protocol: SCTP
      # -- NodePort (optional, only used when type is NodePort)
      # @default -- `""` (auto-assign)
      nodePort: ""

    # -- N3 interface (GTP-U - user plane to UPF)
    n3:
      # -- Enable N3 port
      enabled: true
      # -- External port
      port: 2152
      # -- Container target port
      # @default -- Same as port
      targetPort: 2152
      # -- Protocol (UDP for GTP-U)
      protocol: UDP
      # -- NodePort (optional, only used when type is NodePort)
      # @default -- `""` (auto-assign)
      nodePort: ""

# -- NetworkPolicy configuration
# Restricts network traffic to/from the CU pod for enhanced security
# IMPORTANT: NetworkPolicy only works when network.hostNetwork is false
networkPolicy:
  # -- Enable NetworkPolicy
  # Only effective when network.hostNetwork is false
  # @default -- `false`
  enabled: false

  # -- Ingress rules (incoming traffic to CU)
  ingress:
    # -- Allow traffic from 5G core (N2/N3 interfaces)
    fiveGCore:
      # -- Enable 5G core ingress
      # @default -- `true`
      enabled: true
      # -- Source selectors for 5G core traffic
      from:
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust for your network CIDR

    # -- Allow traffic from DU (F1-C/F1-U interfaces)
    du:
      # -- Enable DU ingress
      # @default -- `true`
      enabled: true
      # -- Source selectors for DU traffic
      from:
        - podSelector:
            matchLabels:
              app: ocudu-du
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust for your network CIDR

    # -- Allow traffic from monitoring systems
    monitoring:
      # -- Enable monitoring ingress
      # @default -- `true`
      enabled: true
      # -- Source selectors for monitoring traffic
      from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - podSelector:
            matchLabels:
              app: telegraf

    # -- Custom ingress rules
    # @default -- `[]`
    custom: []

  # -- Egress rules (outgoing traffic from CU)
  egress:
    # -- Allow traffic to 5G core (N2/N3)
    fiveGCore:
      # -- Enable 5G core egress
      # @default -- `true`
      enabled: true
      # -- Destination selectors for 5G core traffic
      to:
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust for your network CIDR

    # -- Allow traffic to DU (F1-C/F1-U)
    du:
      # -- Enable DU egress
      # @default -- `true`
      enabled: true
      # -- Destination selectors for DU traffic
      to:
        - podSelector:
            matchLabels:
              app: ocudu-du
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust for your network CIDR

    # -- Allow traffic to monitoring systems
    monitoring:
      # -- Enable monitoring egress
      # @default -- `true`
      enabled: true
      # -- Destination selectors for monitoring traffic
      to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - podSelector:
            matchLabels:
              app: influxdb

    # -- Custom egress rules
    # @default -- `[]`
    custom: []

# -- Persistent storage configuration
persistence:
  enabled: true
  # -- Storage type: "pvc" or "hostPath"
  type: hostPath
  pvc:
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  hostPath:
    path: "/mnt/debugging-logs"
    type: DirectoryOrCreate
  mountPath: "/var/log/srs"
  preserveOldLogs: true

# -- CU configuration file
config:
  cu-config.yml: |-
    cu_cp:
      amf:
        addrs: 127.0.1.100
        bind_addrs: 127.0.0.1
        supported_tracking_areas:
          - tac: 7
            plmn_list:
              - plmn: "00101"
                tai_slice_support_list:
                  - sst: 1
      f1ap:
        bind_addrs: 127.0.10.1

    cu_up:
      f1u:
        bind_port: 2151
        socket:
          - bind_addr: 127.0.10.1

    log:
      filename: /var/log/srs/cu.log
      all_level: warning

    metrics:
      enable_json: false
      enable_log: false

    pcap:
      ngap_enable: false
      ngap_filename: /var/log/srs/cu_ngap.pcap
