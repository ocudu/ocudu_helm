# -- Container image configuration
image:
  # -- Container image repository
  repository: registry.gitlab.com/ocudu/ocudu/ocudu_nightly_avx512
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag
  # @default -- Chart appVersion
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of resources
fullnameOverride: ""

# -- ConfigMap name overrides
configmap:
  main: { nameOverride: "" }
  entrypoint: { nameOverride: "" }

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- RBAC configuration
rbac:
  create: true
  extraRules: []

# -- Pod Disruption Budget configuration
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow

# -- Additional pod annotations
podAnnotations: {}

# -- Extra labels applied to the Deployment and Pod template
extraLabels: {}

# -- DU liveness probe configuration.
livenessProbe:
  enabled: true
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

# -- DU readiness probe configuration.
readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 30
  successThreshold: 1

# -- Pod-level security context. Runs the container as a non-root user by default.
# @default -- see below
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: true
  privileged: false
  capabilities:
    drop: ["ALL"]
    add:
      - SYS_NICE
      - IPC_LOCK

# -- Resource requests and limits
resources: {}

# -- Network configuration
network:
  # -- Enable host network mode
  # false (default): Uses CNI network (NetworkPolicy supported)
  # true: Uses host network namespace directly (NetworkPolicy NOT supported)
  # @default -- `false`
  hostNetwork: false

# -- Node selector for pod assignment
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations: {}

# -- Pod affinity configuration
affinity: {}

# -- Metrics service configuration
# Exposes CU metrics endpoint for Telegraf collection
metricsService:
  # -- Enable metrics service
  enabled: false
  # -- Enable power consumption metrics via RAPL
  # @default -- `false`
  powercap:
    enabled: false

  # -- Service type (ClusterIP, NodePort, or LoadBalancer)
  # @default -- `ClusterIP`
  type: ClusterIP

  # -- LoadBalancer IP address (optional, when type is LoadBalancer)
  # @default -- `""` (auto-assign)
  loadBalancerIP: ""

  # -- LoadBalancer class (optional, for clusters with multiple LB implementations)
  # @default -- `""` (use default)
  loadBalancerClass: ""

  # -- External traffic policy (Cluster or Local)
  # @default -- `Cluster`
  externalTrafficPolicy: Cluster

  # -- Session affinity (None or ClientIP)
  # @default -- `None`
  sessionAffinity: None

  # -- NodePort (optional, only used when type is NodePort)
  # @default -- `""` (auto-assign)
  nodePort: ""

  # -- Service port (must match the port in cu-config.yml)
  port: 8001

  # -- Target port (container port)
  targetPort: 8001

# -- Service configuration for N2 and N3 interfaces
service:
  # -- Enable service for N2/N3 interfaces (5GC connectivity)
  enabled: false

  # -- Service type (ClusterIP, NodePort, or LoadBalancer)
  # @default -- `LoadBalancer`
  type: LoadBalancer

  # -- LoadBalancer IP address (optional, cluster-dependent)
  # @default -- `""` (auto-assign)
  loadBalancerIP: ""

  # -- LoadBalancer class (optional, for clusters with multiple LB implementations)
  # @default -- `""` (use default)
  loadBalancerClass: ""

  # -- External traffic policy (Cluster or Local)
  # @default -- `Cluster`
  externalTrafficPolicy: Cluster

  # -- Session affinity (None or ClientIP)
  # @default -- `None`
  sessionAffinity: None

  # -- Port configuration for N2 and N3 interfaces
  ports:
    # -- N2 interface (NGAP - control plane to AMF)
    n2:
      # -- Enable N2 port
      enabled: true
      # -- External port
      port: 38412
      # -- Container target port
      # @default -- Same as port
      targetPort: 38412
      # -- Protocol (SCTP for NGAP)
      protocol: SCTP
      # -- NodePort (optional, only used when type is NodePort)
      # @default -- `""` (auto-assign)
      nodePort: ""

    # -- N3 interface (GTP-U - user plane to UPF)
    n3:
      # -- Enable N3 port
      enabled: true
      # -- External port
      port: 2152
      # -- Container target port
      # @default -- Same as port
      targetPort: 2152
      # -- Protocol (UDP for GTP-U)
      protocol: UDP
      # -- NodePort (optional, only used when type is NodePort)
      # @default -- `""` (auto-assign)
      nodePort: ""

# -- Persistent storage configuration
persistence:
  enabled: true
  # -- Storage type: "pvc" or "hostPath"
  type: hostPath
  pvc:
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  hostPath:
    path: "/mnt/debugging-logs"
    type: DirectoryOrCreate
  mountPath: "/var/log/srs"
  preserveOldLogs: true

# -- CU configuration file
config:
  cu-config.yml: |-
    cu_cp:
      amf:
        addrs: 127.0.1.100
        bind_addrs: 127.0.0.1
        supported_tracking_areas:
          - tac: 7
            plmn_list:
              - plmn: "00101"
                tai_slice_support_list:
                  - sst: 1
      f1ap:
        bind_addrs: 127.0.10.1

    cu_up:
      f1u:
        socket:
          - bind_addr: 127.0.10.1

    log:
      filename: /var/log/srs/cu.log
      all_level: warning

    metrics:
      enable_json: false
      enable_log: false

    pcap:
      ngap_enable: false
      ngap_filename: /var/log/srs/cu_ngap.pcap
