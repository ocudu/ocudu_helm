apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-du.mainConfigmapName" . }}
data:
  {{- .Values.config | toYaml | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocudu-du.entrypointConfigmapName" . }}
data:
  entrypoint-ocudu-du.sh: {{ tpl (.Files.Get "resources/entrypoint.sh") . | quote | default 000 }}
