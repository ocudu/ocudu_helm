apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocudu-du.fullname" . }}
  labels:
    {{- include "ocudu-du.labels" . | nindent 4 }}
    {{- with .Values.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ocudu-du.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ocudu-du.selectorLabels" . | nindent 8 }}
        {{- with .Values.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ocudu-du.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.network.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      volumes:
        - name: entrypoint-volume-ocudu-du
          configMap:
            name: {{ include "ocudu-du.entrypointConfigmapName" . }}
            defaultMode: 0777
        {{- if (.Values.o1).enable_ocudu_o1 }}
        - name: o1-du-config
          emptyDir:
            sizeLimit: 2Mi
        - name: netconf-running-config-volume
          emptyDir:
            sizeLimit: 2Mi
        - name: o1-config-volume
          configMap:
            name: {{ include "ocudu-du.o1ConfigmapName" . }}
            defaultMode: 0777
        {{- if and (.Values.o1).netconfServer.tls.enabled (.Values.o1).netconfServer.tls.certSecret }}
        - name: netconf-tls-certs
          secret:
            secretName: {{ (.Values.o1).netconfServer.tls.certSecret }}
        {{- end }}
        {{- else }}
        - name: config-volume
          configMap:
            name: {{ include "ocudu-du.mainConfigmapName" . }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
          {{- if eq .Values.persistence.type "pvc" }}
        - name: ocudu-logs
          persistentVolumeClaim:
            claimName: {{ include "ocudu-du.fullname" . }}-logs
          {{- else if eq .Values.persistence.type "hostPath" }}
        - name: ocudu-logs
          hostPath:
            path: {{ .Values.persistence.hostPath.path }}
            type: {{ .Values.persistence.hostPath.type }}
          {{- end }}
        {{- else }}
        - name: ocudu-logs
          emptyDir: {}
        {{- end }}
          {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-1Gi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-1Gi")) }}
        - name: hugepage-1gi
          emptyDir:
            medium: HugePages-1Gi
        {{- end }}
        {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-2Mi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-2Mi")) }}
        - name: hugepage-2mi
          emptyDir:
            medium: HugePages-2Mi
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          tty: true
          stdin: true
          securityContext:
            {{- if and .Values.metricsService.enabled .Values.metricsService.powercap.enabled }}
            {{- $ctx := deepCopy .Values.securityContext }}
            {{- $_ := set $ctx.capabilities "add" (append $ctx.capabilities.add "PERFMON") }}
            {{- toYaml $ctx | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- end }}
          image: "{{ template "ocudu-du.image" .Values.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- $hasLimits := and .Values.resources .Values.resources.limits (gt (len .Values.resources.limits) 0) }}
          {{- $hasRequests := and .Values.resources .Values.resources.requests (gt (len .Values.resources.requests) 0) }}
          {{- if or $hasLimits $hasRequests .Values.sriovConfig.enabled }}
          resources:
            {{- if or $hasLimits .Values.sriovConfig.enabled }}
            limits:
              {{- if $hasLimits }}
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{- end }}
              {{- if .Values.sriovConfig.enabled }}
              {{ .Values.sriovConfig.extendedResourceName }}: 1
              {{- end }}
            {{- end }}
            {{- if or $hasRequests .Values.sriovConfig.enabled }}
            requests:
              {{- if $hasRequests }}
              {{- toYaml .Values.resources.requests | nindent 14 }}
              {{- end }}
              {{- if .Values.sriovConfig.enabled }}
              {{ .Values.sriovConfig.extendedResourceName }}: 1
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if and (.Values.o1).enable_ocudu_o1 .Values.livenessProbe.enabled }}
          # O1 mode: liveness is tied to the O1 adapter's /config-healthy endpoint.
          livenessProbe:
            httpGet:
              path: /config-healthy
              port: {{ (.Values.o1).healthcheckPort }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- else if and (not (.Values.o1).enable_ocudu_o1) .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command: ["pgrep", "odu"]
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command: ["pgrep", "odu"]
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOSTNETWORK
              value: '{{ .Values.network.hostNetwork }}'
            - name: OCUDU_LOG_DIR
              value: {{ .Values.persistence.mountPath | quote }}
            - name: PRESERVE_OLD_LOGS
              value: {{ .Values.persistence.preserveOldLogs | quote }}
          {{- if and .Values.sriovConfig .Values.sriovConfig.enabled }}
            - name: RESOURCE_EXTENDED
              value: {{ .Values.sriovConfig.extendedResourceName | quote }}
          {{- end }}
            - name: ENABLE_OCUDU_O1
              value: '{{ default false (.Values.o1).enable_ocudu_o1 }}'
          command: [ "/usr/bin/tini", "--" ]
          args: [ "/bin/bash", "-c", "/etc/entrypoint/entrypoint-ocudu-du.sh /etc/config/du-config.yml" ]
          volumeMounts:
            - name: entrypoint-volume-ocudu-du
              mountPath: /etc/entrypoint
            {{- if (.Values.o1).enable_ocudu_o1 }}
            - name: o1-du-config
              mountPath: /etc/config/
            {{- else }}
            - name: config-volume
              mountPath: /etc/config/
            {{- end }}
            - name: ocudu-logs
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-1Gi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-1Gi")) }}
            - name: hugepage-1gi
              mountPath: /hugepages-1Gi
            {{- end }}
            {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-2Mi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-2Mi")) }}
            - name: hugepage-2mi
              mountPath: /hugepages-2Mi
            {{- end }}
          {{- if (.Values.o1).enable_ocudu_o1 }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    timeout=30
                    elapsed=0
                    while [ $elapsed -lt $timeout ]; do
                      response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ (.Values.o1).healthcheckPort }}/config-healthy)
                      echo "Health check response: $response"
                      if [[ "$response" =~ 200 || "$response" =~ 400 ]]; then
                        echo "API server is healthy."
                        curl -H "Content-Type: application/json" -d "{restarted:true}" -X POST http://localhost:{{ (.Values.o1).healthcheckPort }}/restarted
                        exit 0
                      fi
                      sleep 5
                      elapsed=$((elapsed + 5))
                    done
                    echo "Netconf server not available, last response: $response. Exiting postStart hook."
                    exit 1
          {{- end }}
        {{- if (.Values.o1).enable_ocudu_o1 }}
        - name: ocudu-o1-adapter
          securityContext:
            {{- toYaml (.Values.o1).o1Adapter.securityContext | nindent 12 }}
          image: "{{ template "ocudu-du.o1.o1Adapter.image" (.Values.o1).o1Adapter.image }}"
          imagePullPolicy: {{ (.Values.o1).o1Adapter.image.pullPolicy }}
          resources:
            {{- toYaml (.Values.o1).o1Adapter.resources | nindent 12 }}
          command: [ "/usr/local/bin/python3" ]
          args:
            - "/usr/src/app/src/o1_adapter.py"
            - "--netconf_host"
            - {{ (.Values.o1).netconfServerAddr }}
            - "--netconf_port"
            - {{ (.Values.o1).o1Port | quote }}
            - "--ves_host"
            - {{ (.Values.o1).ves.host | quote }}
            - "--ves_port"
            - {{ (.Values.o1).ves.port | quote }}
            - "--ves_username"
            - {{ (.Values.o1).ves.username | quote }}
            - "--ves_password"
            - {{ (.Values.o1).ves.password | quote }}
            - "--ves_scheme"
            - {{ (.Values.o1).ves.scheme | quote }}
            - "--ws_host"
            - {{ (.Values.o1).ws.host | quote }}
            - "--ws_port"
            - {{ (.Values.o1).ws.port | quote }}
            {{- if (.Values.o1).oamIpv4Address }}
            - "--oam_ipv4_address"
            - {{ (.Values.o1).oamIpv4Address | quote }}
            {{- end }}
            - "--loglevel"
            - {{ (.Values.o1).log_level | quote }}
            - "--profile"
            - "du"
            - "--config"
            - "/etc/config/du-config.yml"
            - "--template"
            - "du.yaml"
          volumeMounts:
            - name: o1-du-config
              mountPath: /etc/config
        - name: netconf-server
          securityContext:
            {{- toYaml (.Values.o1).netconfServer.securityContext | nindent 12 }}
          image: "{{ template "ocudu-du.o1.netconfServer.image" (.Values.o1).netconfServer.image }}"
          imagePullPolicy: {{ (.Values.o1).netconfServer.image.pullPolicy }}
          resources:
            {{- toYaml (.Values.o1).netconfServer.resources | nindent 12 }}
          ports:
            - name: netconf
              containerPort: {{ (.Values.o1).o1Port }}
              protocol: TCP
            {{- if (.Values.o1).netconfServer.tls.enabled }}
            - name: netconf-tls
              containerPort: 6513
              protocol: TCP
            {{- end }}
          command: [ "/usr/local/bin/entrypoint.sh" ]
          args:
            - "--config"
            - "du"
            - "--custom-config"
            - "/etc/netconf/o1-config.xml"
            {{- if (.Values.o1).netconfServer.tls.enabled }}
            - "--enable-tls"
            - "--tls-cert-dir"
            - "/etc/netconf-tls"
            {{- end }}
          volumeMounts:
            - name: o1-config-volume
              mountPath: /etc/netconf
            - name: netconf-running-config-volume
              mountPath: /etc/netconf-running
            {{- if and (.Values.o1).netconfServer.tls.enabled (.Values.o1).netconfServer.tls.certSecret }}
            - name: netconf-tls-certs
              mountPath: /etc/netconf-tls
              readOnly: true
            {{- end }}
        {{- end }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
