apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ocudu-du.serviceAccountName" . }}
  labels:
    {{- include "ocudu-du.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
