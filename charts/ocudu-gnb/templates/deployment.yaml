apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocudu-gnb.fullname" . }}
  labels:
    {{- include "ocudu-gnb.labels" . | nindent 4 }}
    {{- with .Values.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ocudu-gnb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ocudu-gnb.selectorLabels" . | nindent 8 }}
        {{- with .Values.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ocudu-gnb.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.network.hostNetwork }}
      hostNetwork: true
      {{- end }}
      volumes:
        - name: entrypoint-volume-srsgnb
          configMap:
            name: {{ include "ocudu-gnb.entrypointConfigmapName" . }}
            defaultMode: 0777
        {{- if .Values.o1.enable_ocudu_o1 }}
        - name: o1-gnb-config
          emptyDir:
            sizeLimit: 2Mi
        - name: netconf-running-config-volume
          emptyDir:
            sizeLimit: 2Mi
        - name: o1-config-volume
          configMap:
            name: {{ include "ocudu-gnb.o1ConfigmapName" . }}
            defaultMode: 0777
        {{- else }}
        - name: config-volume
          configMap:
            name: {{ include "ocudu-gnb.mainConfigmapName" . }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
          {{- if eq .Values.persistence.type "pvc" }}
        - name: srs-logs
          persistentVolumeClaim:
            claimName: {{ include "ocudu-gnb.fullname" . }}-logs
          {{- else if eq .Values.persistence.type "hostPath" }}
        - name: srs-logs
          hostPath:
            path: {{ .Values.persistence.hostPath.path }}
            type: {{ .Values.persistence.hostPath.type }}
          {{- end }}
        {{- end }}
          {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-1Gi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-1Gi")) }}
        - name: hugepage-1gi
          emptyDir:
            medium: HugePages-1Gi
        {{- end }}
        {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-2Mi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-2Mi")) }}
        - name: hugepage-2mi
          emptyDir:
            medium: HugePages-2Mi
        {{- end }}
        {{- if and .Values.metricsService.enabled .Values.metricsService.powercap.enabled }}
        - name: powercap-sysfs
          hostPath:
            path: /sys/class/powercap
            type: Directory
        - name: powercap-devices
          hostPath:
            path: /sys/devices/virtual/powercap
            type: Directory
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          tty: true
          stdin: true
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ template "ocudu-gnb.image" .Values.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.resources .Values.sriovConfig.enabled }}
          resources:
            {{- if .Values.resources }}
            {{- $res := .Values.resources }}
            {{- $cleanRes := omit $res "enable_hugepages_1gi" "enable_hugepages_2mi" }}
            {{- toYaml $cleanRes | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if and .Values.o1.enable_ocudu_o1 .Values.livenessProbe.enabled }}
          # O1 mode: liveness is tied to the O1 adapter's /config-healthy endpoint.
          livenessProbe:
            httpGet:
              path: /config-healthy
              port: {{ .Values.o1.healthcheckPort }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- else if and (not .Values.o1.enable_ocudu_o1) .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command: ["pgrep", "gnb"]
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command: ["pgrep", "gnb"]
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: USE_EXT_CORE
              value: {{ include "useExtCore" . }}
            - name: HOSTNETWORK
              value: '{{ .Values.network.hostNetwork }}'
          {{- if and .Values.service .Values.service.type (eq .Values.service.type "LoadBalancer") }}
            - name: LB_IP
              value: {{ .Values.service.loadBalancerIP | quote }}
          {{- end }}
          {{- if and .Values.sriovConfig .Values.sriovConfig.enabled }}
            - name: RESOURCE_EXTENDED
              value: {{ .Values.sriovConfig.extendedResourceName | quote }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
            - name: PRESERVE_OLD_LOGS
              value: {{ .Values.persistence.preserveOldLogs | quote }}
          {{- end }}
            - name: ENABLE_OCUDU_O1
              value: '{{ default false .Values.o1.enable_ocudu_o1 }}'
          command: [ "/usr/bin/tini", "--" ]
          args: [ "/bin/bash", "-c", "/etc/entrypoint/entrypoint-srsgnb.sh /etc/config/gnb-config.yml" ]
          volumeMounts:
            - name: entrypoint-volume-srsgnb
              mountPath: /etc/entrypoint
            {{- if .Values.o1.enable_ocudu_o1 }}
            - name: o1-gnb-config
              mountPath: /etc/config/
            {{- else }}
            - name: config-volume
              mountPath: /etc/config/
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: srs-logs
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-1Gi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-1Gi")) }}
            - name: hugepage-1gi
              mountPath: /hugepages-1Gi
            {{- end }}
            {{- if or (and .Values.resources.limits (index .Values.resources.limits "hugepages-2Mi")) (and .Values.resources.requests (index .Values.resources.requests "hugepages-2Mi")) }}
            - name: hugepage-2mi
              mountPath: /hugepages-2Mi
            {{- end }}
            {{- if and .Values.metricsService.enabled .Values.metricsService.powercap.enabled }}
            - name: powercap-sysfs
              mountPath: /sys/class/powercap
              readOnly: true
            - name: powercap-devices
              mountPath: /sys/devices/virtual/powercap
              readOnly: true
            {{- end }}
          {{- if .Values.o1.enable_ocudu_o1 }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    timeout=30
                    elapsed=0
                    while [ $elapsed -lt $timeout ]; do
                      response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ .Values.o1.healthcheckPort }}/config-healthy)
                      echo "Health check response: $response"
                      if [[ "$response" =~ 200 || "$response" =~ 400 ]]; then
                        echo "API server is healthy."
                        curl -H "Content-Type: application/json" -d "{restarted:true}" -X POST http://localhost:{{ .Values.o1.healthcheckPort }}/restarted
                        exit 0
                      fi
                      sleep 5
                      elapsed=$((elapsed + 5))
                    done
                    echo "Netconf server not available, last response: $response. Exiting postStart hook."
                    exit 1
          {{- end }}
        {{- if .Values.o1.enable_ocudu_o1 }}
        - name: srs-o1-adapter
          securityContext:
            {{- toYaml .Values.o1.o1Adapter.securityContext | nindent 12 }}
          image: "{{ template "ocudu-gnb.o1.o1Adapter.image" .Values.o1.o1Adapter.image }}"
          imagePullPolicy: {{ .Values.o1.o1Adapter.image.pullPolicy }}
          resources:
            {{- toYaml .Values.o1.o1Adapter.resources | nindent 12 }}
          command: [ "/usr/local/bin/python3" ]
          args:
            - "/usr/src/app/src/o1_adapter.py"
            - "--netconf_host"
            - {{ .Values.o1.netconfServerAddr }}
            - "--netconf_port"
            - {{ .Values.o1.o1Port | quote }}
            - "--ves_host"
            - {{ .Values.o1.ves.host | quote }}
            - "--ves_port"
            - {{ .Values.o1.ves.port | quote }}
            - "--ves_username"
            - {{ .Values.o1.ves.username | quote }}
            - "--ves_password"
            - {{ .Values.o1.ves.password | quote }}
            - "--ws_host"
            - {{ .Values.o1.ws.host | quote }}
            - "--ws_port"
            - {{ .Values.o1.ws.port | quote }}
            {{- if .Values.o1.oamIpv4Address }}
            - "--oam_ipv4_address"
            - {{ .Values.o1.oamIpv4Address | quote }}
            {{- end }}
            - "--loglevel"
            - {{ .Values.o1.log_level | quote }}
            - "--config"
            - "/etc/config/gnb-config.yml"
            - "--template"
            - "gnb.yaml"
          volumeMounts:
            - name: o1-gnb-config
              mountPath: /etc/config
        - name: netconf-server
          securityContext:
            {{- toYaml .Values.o1.netconfServer.securityContext | nindent 12 }}
          image: "{{ template "ocudu-gnb.o1.netconfServer.image" .Values.o1.netconfServer.image }}"
          imagePullPolicy: {{ .Values.o1.netconfServer.image.pullPolicy }}
          resources:
            {{- toYaml .Values.o1.netconfServer.resources | nindent 12 }}
          ports:
            - name: netconf
              containerPort: {{ .Values.o1.o1Port }}
              protocol: TCP
          command: [ "/usr/local/bin/entrypoint.sh" ]
          args:
            - "--config"
            - "gnb"
            - "--custom-config"
            - "/etc/netconf/o1-config.xml"
          volumeMounts:
            - name: o1-config-volume
              mountPath: /etc/netconf
            - name: netconf-running-config-volume
              mountPath: /etc/netconf-running
        {{- end }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
