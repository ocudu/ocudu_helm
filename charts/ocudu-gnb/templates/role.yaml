apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ocudu-gnb.serviceAccountName" . }}
  labels:
    {{- include "ocudu-gnb.labels" . | nindent 4 }}
rules:
  # Allow reading ConfigMaps (for potential dynamic config reload)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Allow reading own Pod info
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
{{- with .Values.rbac.extraRules }}
  # Additional custom rules
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
