apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ocudu-gnb.serviceAccountName" . }}
  labels:
    {{- include "ocudu-gnb.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
