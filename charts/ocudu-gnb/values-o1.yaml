                <vlanId>0</vlanId>
              </localAddress>
              <remoteAddress>127.0.1.100</remoteAddress>
            </attributes>
          </EP_NgC>

      </GNBCUCPFunction>
      
      <GNBCUUPFunction xmlns="urn:3gpp:sa5:_3gpp-nr-nrm-gnbcuupfunction">
        <id>cuup1</id>
        <attributes>
          <priorityLabel>1</priorityLabel>
          <resourceType>DRB</resourceType>
          <rRMPolicyMemberList>
            <mcc>001</mcc>
            <mnc>01</mnc>
            <sd>111111</sd>
            <sst>1</sst>
          </rRMPolicyMemberList>
          <gNBId>1</gNBId>
          <gNBIdLength>24</gNBIdLength>
          <pLMNInfoList>
            <mcc>001</mcc>
            <mnc>01</mnc>
            <sd>111111</sd>
            <sst>1</sst>
          </pLMNInfoList>
        </attributes>
      </GNBCUUPFunction>
      
      <GNBDUFunction xmlns="urn:3gpp:sa5:_3gpp-nr-nrm-gnbdufunction">
        <id>du1</id>
        <attributes>
          <resourceType>PRB</resourceType>
          <rRMPolicyMemberList>
              <mcc>001</mcc>
              <mnc>01</mnc>
              <sd>111111</sd>
              <sst>1</sst>
          </rRMPolicyMemberList>
          <gNBId>411</gNBId>
          <gNBIdLength>23</gNBIdLength>
          <gNBDUId>3</gNBDUId>
          <priorityLabel>1</priorityLabel>
        </attributes>
        <NRCellDU xmlns="urn:3gpp:sa5:_3gpp-nr-nrm-nrcelldu">
          <id>nrcelldu1</id>
          <attributes>
            <resourceType>PRB</resourceType>
            <rRMPolicyMemberList>
              <mcc>001</mcc>
              <mnc>01</mnc>
              <sd>111111</sd>
              <sst>1</sst>
            </rRMPolicyMemberList>
            <priorityLabel>1</priorityLabel>
            <cellLocalId>0</cellLocalId>
            <administrativeState>UNLOCKED</administrativeState>
            <pLMNInfoList>
              <mcc>001</mcc>
              <mnc>01</mnc>
              <sd>111111</sd>
              <sst>1</sst>
            </pLMNInfoList>
            <nRPCI>1</nRPCI>
            <nRTAC>7</nRTAC>
            <arfcnDL>632192</arfcnDL>
            <arfcnUL>632192</arfcnUL>
            <bSChannelBwDL>100</bSChannelBwDL>
            <bSChannelBwUL>100</bSChannelBwUL>
