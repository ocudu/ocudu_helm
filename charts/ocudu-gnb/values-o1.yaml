              </srs_nrcelldu_extensions>
          </attributes>
        </NRCellDU>

        <EP_F1C xmlns="urn:3gpp:sa5:_3gpp-nr-nrm-ep">
          <id>f1c1</id>
          <attributes>
            <!-- f1c bind addresss -->
            <localAddress>  
