        </srs_gnbdufunction_extensions>

      </GNBDUFunction>
    </ManagedElement>

    <!-- mandatory user -->
    <users xmlns="urn:o-ran:user-mgmt:1.0">
      <user>
        <name>netconf</name>
        <account-type>PASSWORD</account-type>
        <enabled>true</enabled>
      </user>
    </users>
