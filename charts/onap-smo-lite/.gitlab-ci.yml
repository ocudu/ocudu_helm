include:
  - local: .gitlab/ci/helm_utils.yml

stages:
  - static
  - publish

helm lint:
  extends: .helm lint
  variables:
    CHART_PATH: charts/onap-smo-lite

helm publish:
  extends: .helm publish
  variables:
    CHART_PATH: charts/onap-smo-lite
    CHART_NAME: onap-smo-lite
  needs:
    - job: helm lint
      optional: true
