# -- Global configuration shared across all components
global:
  # -- Kubernetes cluster domain suffix (MANDATORY - must match your cluster)
  # This is used to construct service FQDNs (e.g., service.namespace.svc.cluster.local)
  # Common values: "cluster.local" (default K8s), "srsk8s.bcn" (example custom domain)
  # @default -- "srsk8s.bcn" (MUST be changed to match your cluster)
  clusterDomain: "srsk8s.bcn"
  
  # -- Image pull secrets for private registries
  # @default -- `[]` (no pull secrets)
  imagePullSecrets: []
  # -- Additional pod annotations
  # @default -- `{}` (no additional annotations)
  podAnnotations: {}
  # -- Node selector for pod assignment
  # @default -- `{}` (no node selector)
  nodeSelector: {}
  # -- Tolerations for pod assignment
  # @default -- `[]` (no tolerations)
  tolerations: []
  # -- Pod affinity configuration
  # @default -- `{}` (no affinity rules)
  affinity: {}

# -- SDNC Web UI configuration
# Web interface for ONAP SDN-R controller
sdncWeb:
  # -- Container image configuration
  image:
    # -- Container image repository
    repository: nexus3.onap.org:10001/onap/sdnc-web-image
    # -- Image tag
    tag: 3.1.1-STAGING-latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type (NodePort for external access)
    type: NodePort
    # -- Service port
    port: 8080
    # -- NodePort for external access
    nodePort: 30080
  
  # -- Environment variables
  env:
    # -- Enable OAuth authentication
    enableOAuth: false
    # -- SDNR backend host URL
    # Uses global.clusterDomain to construct the FQDN
    # @default -- "onap-smo-sdnr.onap.svc.{{ .Values.global.clusterDomain }}"
    sdnrHost: "onap-smo-sdnr.onap.svc.{{ .Values.global.clusterDomain }}"
  
  # -- Ingress configuration
  ingress:
    # -- Enable Ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Ingress annotations
    # @default -- `{}` (no annotations)
    annotations: {}
    # -- Ingress hosts configuration
    hosts:
      - host: sdnc-web.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration
    # @default -- `[]` (no TLS)
    tls: []
  
  # -- Resource requests and limits
  # @default -- `{}` (no resource constraints)
  resources: {}

# -- SDN-R (Software Defined Networking - Radio) configuration
# OpenDaylight-based controller for RAN management
sdnr:
  # -- Container image configuration
  image:
    # -- Container image repository
    repository: nexus3.onap.org:10001/onap/sdnc-image
    # -- Image tag
    tag: 3.1.1-STAGING-latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port (OpenDaylight REST API)
    port: 8181
  
  # -- Admin credentials for SDN-R
  adminCredentials:
    # -- Admin username
    username: root
    # -- Admin password (change for production)
    password: root
    # -- Use existing secret for credentials
    # @default -- `""` (create new secret)
    existingSecret: ""
  
  # -- Configuration directory path
  configDir: /opt/onap/ccsdk/data/properties
  
  # -- Java options for JVM tuning
  javaOpts: "-Xms256m -Xmx4g"
  
  # -- Environment variables for SDN-R
  env:
    # -- SDN-R controller unique identifier
    sdnrControllerId: c94bbd5f-d456-44bd-aa7a-47b274f73762
    # -- Enable A1 adapter northbound interface
    a1AdapterNorthbound: "false"
    # -- Number of CCSDK replicas
    ccsdkReplicas: "0"
    # -- Domain name
    domain: ""
    # -- Enable OAuth authentication
    enableOAuth: "false"
    # -- Database type
    sdnrDbType: ELASTICSEARCH
    # -- Enable device manager
    sdnrDm: "false"
    # -- Initialize SDN-R on startup
    sdnrInit: "true"
    # -- Run SDN-R only (no SDNC)
    sdnrOnly: "true"
    # -- Enable wireless transport features
    sdnrWt: "true"
    # -- Enable asynchronous handling
    sdnrAsyncHandling: "true"
    # -- Async thread pool size
    sdnrAsyncPoolSize: "200"
    # -- Enable NETCONF call home
    sdnrNetconfCallHomeEnabled: "true"
    # -- Elasticsearch database URL
    # Uses global.clusterDomain to construct the FQDN
    # @default -- "http://onap-smo-sdnrdb.onap.svc.{{ .Values.global.clusterDomain }}:9200"
    sdnrDbUrl: "http://onap-smo-sdnrdb.onap.svc.{{ .Values.global.clusterDomain }}:9200"
  
  # -- Persistence configuration
  persistence:
    # -- Enable persistent storage
    enabled: false
    # -- Use existing PVC
    # @default -- `""` (create new PVC)
    existingClaim: ""
    # -- Access modes for PVC
    accessModes:
      - ReadWriteOnce
    # -- Storage size
    size: 2Gi
    # -- Storage class name
    # @default -- `""` (use default storage class)
    storageClass: ""
  
  # -- Device manager configuration file
  # @default -- See values.yaml for full configuration
  config:
    # -- Device manager properties
    devicemanager: |-
      [aai]
      aaiPropertiesFile=null
      aaiUrl=off
      aaiHeaders=["X-TransactionId: 9999"]
      aaiDeleteOnMountpointRemove=false
      aaiTrustAllCerts=false
      aaiApiVersion=aai/v13
      aaiClientConnectionTimeout=30000
      aaiApplicationId=SDNR
      aaiReadTimeout=60000
      aaiUserCredentials=
      aaiPcks12ClientCertFile=
      aaiPcks12ClientCertPassphrase=

      [devicemonitor]
      SeverityconnectionLossOAM=Major
      SeverityconnectionLossMediator=Major
      SeverityconnectionLossNeOAM=Major

      [dmonf]
      pollAlarms=false

      [toggleAlarmFilter]
      taEnabled=true
      taDelay=3000

      [housekeeping]
      hkEnabled=false

      [dcae]
      dcaeUrl=off
      dcaeUserCredentials=root:root
      dcaeHeartbeatPeriodSeconds=120

      [pm]
      pmEnabled=true

      [VESCollector]
      VES_COLLECTOR_ENABLED=false
      VES_COLLECTOR_TLS_ENABLED=false
      VES_COLLECTOR_TRUST_ALL_CERTS=false
      VES_COLLECTOR_USERNAME=sample1
      VES_COLLECTOR_PASSWORD=sample1
      VES_COLLECTOR_IP=onap-smo-ves-collector.onap.svc.{{ .Values.global.clusterDomain }}
      VES_COLLECTOR_PORT=8443
      VES_COLLECTOR_VERSION=v7
      REPORTING_ENTITY_NAME=ONAP SDN-R
      EVENTLOG_MSG_DETAIL=SHORT

      [dmonf14]
      useDomApi=${SDNR_ONF14_USEDOMAPI}
  
  # -- Config mount path
  configMountPath: /opt/opendaylight/etc
  
  # -- Resource requests and limits
  # @default -- `{}` (no resource constraints)
  resources: {}

# -- SDN-R Registrar configuration
# Registers SDN-R with Kafka for event streaming
sdnrRegistrar:
  # -- Registrar configuration file
  # @default -- See values.yaml for full configuration
  config: |-
    [stndDefinedFault]
    topic=unauthenticated.SEC_3GPP_FAULTSUPERVISION_OUTPUT
    consumerGroup=myG
    consumerID=C1
    timeout=20000
    limit=10000
    fetchPause=5000

    [general]
    baseUrl=http://onap-smo-sdnr.onap.svc.{{ .Values.global.clusterDomain }}:8181
    sdnrUser=root
    sdnrPasswd=root

    [strimzi-kafka]
    strimziEnabled=true
    bootstrapServers=onap-smo-kafka.onap.svc.{{ .Values.global.clusterDomain }}:9092
    securityProtocol=PLAINTEXT
    saslMechanism=PLAIN
    saslJaasConfig=PLAIN

    [fault]
    topic=unauthenticated.SEC_FAULT_OUTPUT
    consumerGroup=myG
    consumerID=C1
    timeout=20000
    limit=10000
    fetchPause=5000

    [provisioning]
    topic=unauthenticated.SEC_3GPP_PROVISIONING_OUTPUT
    consumerGroup=myG
    consumerID=C1
    timeout=20000
    limit=10000
    fetchPause=5000

    [pnfRegistration]
    topic=unauthenticated.VES_PNFREG_OUTPUT
    consumerGroup=myG
    consumerID=C1
    timeout=20000
    limit=10000
    fetchPause=5000

# -- Elasticsearch configuration for SDN-R database
sdnrdb:
  # -- Container image configuration
  image:
    # -- Container image repository
    repository: docker.elastic.co/elasticsearch/elasticsearch-oss
    # -- Image tag
    tag: 7.9.3
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 9200
  
  # -- Environment variables
  env:
    # -- Elasticsearch discovery type (single-node for demo)
    discoveryType: single-node
  
  # -- Persistence configuration
  persistence:
    # -- Enable persistent storage
    enabled: false
    # -- Use existing PVC
    # @default -- `""` (create new PVC)
    existingClaim: ""
    # -- Access modes for PVC
    accessModes:
      - ReadWriteOnce
    # -- Storage size
    size: 5Gi
    # -- Storage class name
    # @default -- `""` (use default storage class)
    storageClass: ""
  
  # -- Resource requests and limits
  # @default -- `{}` (no resource constraints)
  resources: {}

# -- Zookeeper configuration (required by Kafka)
zookeeper:
  # -- Enable Zookeeper deployment
  enabled: true
  
  # -- Container image configuration
  image:
    # -- Container image repository (Strimzi Kafka includes Zookeeper)
    repository: quay.io/strimzi/kafka
    # -- Image tag
    tag: 0.43.0-kafka-3.8.0
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 2181
  
  # -- Environment variables for Zookeeper
  env:
    # -- Log directory
    LOG_DIR: /tmp/logs
    # -- Number of Zookeeper replicas
    ZOOKEEPER_REPLICAS: "1"
    # -- Tick time in milliseconds
    ZOOKEEPER_TICK_TIME: "2000"
    # -- Sync limit
    ZOOKEEPER_SYNC_LIMIT: "5"
    # -- Init limit
    ZOOKEEPER_INIT_LIMIT: "10"
    # -- Max client connections
    ZOOKEEPER_MAX_CLIENT_CNXNS: "200"
    # -- Autopurge snapshot retain count
    ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT: "3"
    # -- Autopurge interval in hours
    ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL: "24"
    # -- Client port
    ZOOKEEPER_CLIENT_PORT: "2181"
  
  # -- Additional environment variables
  # @default -- `[]` (no extra env vars)
  extraEnv: []
  
  # -- Resource requests and limits
  # @default -- `{}` (no resource constraints)
  resources: {}

# -- Kafka configuration for event streaming
kafka:
  # -- Enable Kafka deployment
  enabled: true
  
  # -- Container image configuration
  image:
    # -- Container image repository
    repository: quay.io/strimzi/kafka
    # -- Image tag
    tag: 0.43.0-kafka-3.8.0
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 9092
  
  # -- Kafka broker configuration
  config:
    # -- Inter-broker listener name
    interBrokerListenerName: PLAINTEXT
    # -- Listener security protocol map
    listenerSecurityProtocolMap: PLAINTEXT:PLAINTEXT,INTERNAL_PLAINTEXT:PLAINTEXT,EXTERNAL_PLAINTEXT:PLAINTEXT
    # -- Listeners
    listeners: PLAINTEXT://0.0.0.0:9092
    # -- Advertised listeners
    # Uses global.clusterDomain to construct the FQDN
    # @default -- "PLAINTEXT://onap-smo-kafka.onap.svc.{{ .Values.global.clusterDomain }}:9092"
    advertisedListeners: "PLAINTEXT://onap-smo-kafka.onap.svc.{{ .Values.global.clusterDomain }}:9092"
    # -- Replication factor
    replicationFactor: 1
    # -- Number of partitions
    numPartitions: 2
  
  # -- Environment variables for Kafka
  env:
    # -- Log directory
    LOG_DIR: /tmp/logs
    # -- Enable CADI (AAF authentication)
    enableCadi: "false"
    # -- Zookeeper connection string
    # Uses global.clusterDomain to construct the FQDN
    # @default -- "onap-smo-zookeeper.onap.svc.{{ .Values.global.clusterDomain }}:2181"
    KAFKA_ZOOKEEPER_CONNECT: "onap-smo-zookeeper.onap.svc.{{ .Values.global.clusterDomain }}:2181"
    # -- Zookeeper connection timeout
    KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: "40000"
    # -- Zookeeper session timeout
    KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: "40000"
    # -- Disable Confluent support metrics
    KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
    # -- Enable Zookeeper ACLs
    KAFKA_ZOOKEEPER_SET_ACL: "true"
    # -- Offsets topic partitions
    KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: "2"
  
  # -- Authentication configuration
  auth:
    # -- Enable authentication
    enabled: false
    # -- Username
    username: ""
    # -- Password
    password: ""
  
  # -- Additional environment variables
  # @default -- `[]` (no extra env vars)
  extraEnv: []
  
  # -- Resource requests and limits
  # @default -- `{}` (no resource constraints)
  resources: {}

# -- Kafka UI configuration
# Web interface for Kafka cluster management
kafkaUi:
  # -- Enable Kafka UI deployment
  enabled: true
  
  # -- Container image configuration
  image:
    # -- Container image repository
    repository: provectuslabs/kafka-ui
    # -- Image tag
    tag: v0.7.2
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type (NodePort for external access)
    type: NodePort
    # -- Service port
    port: 8080
    # -- NodePort for external access
    nodePort: 30085
  
  # -- Ingress configuration
  ingress:
    # -- Enable Ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Ingress annotations
    # @default -- `{}` (no annotations)
    annotations: {}
    # -- Ingress hosts configuration
    hosts:
      - host: kafka-ui.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration
    # @default -- `[]` (no TLS)
    tls: []
  
  # -- Environment variables
  env:
    # -- Enable dynamic configuration
    dynamicConfigEnabled: "true"
  
  # -- Additional environment variables
  # @default -- `[]` (no extra env vars)
  extraEnv: []
  
  # -- Resource requests and limits
  # @default -- `{}` (no resource constraints)
  resources: {}

# -- VES Collector configuration
# Collects Virtual Event Streaming (VES) events from network functions
vesCollector:
  # -- Enable VES Collector deployment
  enabled: true
  
  # -- Container image configuration
  image:
    # -- Container image repository
    repository: nexus3.onap.org:10001/onap/org.onap.dcaegen2.collectors.ves.vescollector
    # -- Image tag
    tag: 1.12.4
    # -- Image pull policy
    pullPolicy: IfNotPresent
  
  # -- Service configuration
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 8443
  
  # -- Environment variables
  env:
    # -- Kafka bootstrap servers
    # Uses global.clusterDomain to construct the FQDN
    # @default -- "onap-smo-kafka.onap.svc.{{ .Values.global.clusterDomain }}:9092"
    bootstrapServers: "onap-smo-kafka.onap.svc.{{ .Values.global.clusterDomain }}:9092"
    # -- DMaaP host (empty = use Kafka)
    dmaapHost: ""
  
  # -- TLS configuration
  tls:
    # -- Enable TLS
    enabled: false
    # -- Trust all certificates
    trustAll: false
  
  # -- Authentication credentials
  credentials:
    # -- Username for basic auth
    username: sample1
    # -- Password for basic auth
    password: sample1
  
  # -- VES API version
  version: v7
  
  # -- VES Collector configuration files
  # @default -- See values.yaml for full configuration
  config:
    # -- Collector properties file
    # Contains security, schema validation, and stream configuration
    collectorProperties: |
      collector.service.secure.port=8443
      auth.method=certBasicAuth
      header.authlist=sample1,$2a$10$0buh.2WeYwN868YMwnNNEuNEAMNYVU9.FSMJGyIKV3dGET/7oGOi6
      collector.keystore.file.location=etc/keystore
      collector.keystore.passwordfile=etc/passwordfile
      collector.cert.subject.matcher=etc/certSubjectMatcher.properties
      collector.truststore.file.location=etc/truststore
      collector.truststore.passwordfile=etc/trustpasswordfile
      collector.schema.checkflag=1
      collector.schema.file={"v1":"./etc/CommonEventFormat_27.2.json","v2":"./etc/CommonEventFormat_27.2.json","v3":"./etc/CommonEventFormat_27.2.json","v4":"./etc/CommonEventFormat_27.2.json","v5":"./etc/CommonEventFormat_28.4.1.json","v7":"./etc/CommonEventFormat_30.2.1_ONAP.json"}
      collector.externalSchema.checkflag=1
      collector.externalSchema.schemasLocation=etc/externalRepo/
      collector.externalSchema.mappingFileLocation=etc/externalRepo/schema-map.json
      event.externalSchema.schemaRefPath=$.event.stndDefinedFields.schemaReference
      event.externalSchema.stndDefinedDataPath=$.event.stndDefinedFields.data
      collector.dmaap.streamid=fault=ves-fault|syslog=ves-syslog|heartbeat=ves-heartbeat|measurementsForVfScaling=ves-measurement|mobileFlow=ves-mobileflow|other=ves-other|stateChange=ves-statechange|thresholdCrossingAlert=ves-thresholdCrossingAlert|voiceQuality=ves-voicequality|sipSignaling=ves-sipsignaling|notification=ves-notification|pnfRegistration=ves-pnfRegistration|3GPP-FaultSupervision=ves-3gpp-fault-supervision|3GPP-Heartbeat=ves-3gpp-heartbeat|3GPP-Provisioning=ves-3gpp-provisioning|3GPP-PerformanceAssurance=ves-3gpp-performance-assurance|o-ran-sc-du-hello-world-pm-streaming-oas3=ves-o-ran-sc-du-hello-world-pm-streaming-oas3|o1-notify-pnf-registration=ves-o1-notify-pnf-registration
      collector.dmaapfile=etc/ves-dmaap-config.json
      collector.description.api.version.location=etc/api_version_description.json
      event.transform.flag=0
      collector.dynamic.config.update.frequency=5
    
    # -- DMaaP/Kafka topic mappings
    # Maps VES event domains to Kafka topics
    # @default -- See values.yaml (contains full topic routing configuration)
    dmaapConfig: |
      {
          "ves-syslog": {
              "type": "message_router",
              "dmaap_info": {
                  "location": "mtl5",
                  "topic_url": "http://dmaap-message-router:3904/events/DCAE-SE-COLLECTOR-EVENTS-DEV"
              }
          },
          "ves-statechange": {
