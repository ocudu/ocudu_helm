# Minimal static PV for the operator-created MongoDB PVC used by:
#   PVC: default/open5gs-sample-mongodb
# This is suitable for a single-node lab cluster using hostPath storage.
#
# Before applying, ensure the node path exists and is writable:
#   /mnt/data/open5gs-sample-mongodb

apiVersion: v1
kind: PersistentVolume
metadata:
  name: open5gs-sample-mongodb-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: default
    name: open5gs-sample-mongodb
  hostPath:
    path: /mnt/data/open5gs-sample-mongodb
    type: DirectoryOrCreate
