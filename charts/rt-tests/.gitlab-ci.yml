include:
  - local: .gitlab/ci/helm_utils.yml

stages:
  - static
  - publish

helm lint:
  extends: .helm lint
  variables:
    CHART_PATH: charts/rt-tests

helm version check:
  extends: .helm version check
  variables:
    CHART_PATH: charts/rt-tests
    CHART_NAME: rt-tests

helm publish-dev:
  extends: .helm publish-dev
  variables:
    CHART_PATH: charts/rt-tests
    CHART_NAME: rt-tests
  needs:
    - job: helm lint
    - job: helm version check

helm publish-prod:
  extends: .helm publish-prod
  variables:
    CHART_PATH: charts/rt-tests
    CHART_NAME: rt-tests
