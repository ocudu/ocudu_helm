apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ru-emulator.configmapName" . }}
data:
  entrypoint.sh: |
{{ .Files.Get "resources/entrypoint.sh" | indent 4 }}
  ru_emulator.yaml: |
    {{- if .Values.config.log }}
    log:
      {{- if .Values.config.log }}
      filename: {{ .Values.config.log.filename }}
      {{- end }}
      {{- if .Values.config.log.level }}
      level: {{ .Values.config.log.level }}
      {{- end }}
    {{- end }}

    {{- if .Values.config.dpdk }}
    dpdk:
      eal_args: "{{ .Values.config.dpdk.eal_args }}"
    {{- end }}

    {{- if .Values.config.ru_emu }}
    ru_emu:
      {{- if .Values.config.ru_emu.cells }}
      cells:
      {{- range .Values.config.ru_emu.cells }}
      -
        {{- if .bandwidth }}
        bandwidth: {{ .bandwidth }}
        {{- end }}
        {{- if .network_interface }}
        network_interface: {{ .network_interface }}
        {{- end }}
        {{- if .ru_mac_addr }}
        ru_mac_addr: {{ .ru_mac_addr }}
        {{- end }}
        {{- if .du_mac_addr }}
        du_mac_addr: {{ .du_mac_addr }}
        {{- end }}
        {{- if .vlan_tag }}
        vlan_tag: {{ .vlan_tag }}
        {{- end }}
        {{- if .ul_port_id }}
        ul_port_id:
{{ toYaml .ul_port_id | nindent 10 }}
        {{- end }}
        {{- if .dl_port_id }}
        dl_port_id:
{{ toYaml .dl_port_id | nindent 10 }}
        {{- end }}
        {{- if .prach_port_id }}
        prach_port_id:
{{ toYaml .prach_port_id | nindent 10 }}
        {{- end }}
        {{- if .compr_method_ul }}
        compr_method_ul: {{ .compr_method_ul }}
        {{- end }}
        {{- if .compr_bitwidth_ul }}
        compr_bitwidth_ul: {{ .compr_bitwidth_ul }}
        {{- end }}
        {{- if .t2a_max_cp_dl }}
        t2a_max_cp_dl: {{ .t2a_max_cp_dl }}
        {{- end }}
        {{- if .t2a_min_cp_dl }}
        t2a_min_cp_dl: {{ .t2a_min_cp_dl }}
        {{- end }}
        {{- if .t2a_max_cp_ul }}
        t2a_max_cp_ul: {{ .t2a_max_cp_ul }}
        {{- end }}
        {{- if .t2a_min_cp_ul }}
        t2a_min_cp_ul: {{ .t2a_min_cp_ul }}
        {{- end }}
        {{- if .t2a_max_up }}
        t2a_max_up: {{ .t2a_max_up }}
        {{- end }}
        {{- if .t2a_min_up }}
        t2a_min_up: {{ .t2a_min_up }}
        {{- end }}
        {{- if .prach_format }}
        prach_format: {{ .prach_format }}
        {{- end }}
      {{- end }}
      {{- end }}
    {{- end }}
