apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ru-emulator.fullname" . }}
  labels:
    {{- include "ru-emulator.labels" . | nindent 4 }}
    {{- with .Values.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ru-emulator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ru-emulator.selectorLabels" . | nindent 8 }}
        {{- with .Values.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      hostNetwork: {{ .Values.network.hostNetwork | default true }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "ru-emulator.configmapName" . }}
        - name: entrypoint-volume
          configMap:
            name: {{ include "ru-emulator.configmapName" . }}
            defaultMode: 0755
        {{- if .Values.persistence.enabled }}
        - name: logs-volume
          {{- if eq .Values.persistence.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "ru-emulator.fullname" . }}-logs
          {{- else if eq .Values.persistence.type "hostPath" }}
          hostPath:
            path: {{ .Values.persistence.hostPath.path }}
            type: {{ .Values.persistence.hostPath.type }}
          {{- end }}
        {{- end }}
        {{- if .Values.config.dpdk }}
        - name: hugepage-1gi
          emptyDir:
            medium: HugePages-1Gi
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.resources .Values.sriovConfig.enabled }}
          resources:
            {{- if .Values.resources }}
            {{- $res := .Values.resources }}
            {{- if and .Values.sriovConfig.enabled (not .Values.network.hostNetwork) }}
            {{- $limits := default dict $res.limits }}
            {{- $requests := default dict $res.requests }}
            {{- $_ := set $limits .Values.sriovConfig.extendedResourceName (toString .Values.sriovConfig.vfCount) }}
            {{- $_ := set $requests .Values.sriovConfig.extendedResourceName (toString .Values.sriovConfig.vfCount) }}
            {{- $_ := set $res "limits" $limits }}
            {{- $_ := set $res "requests" $requests }}
            {{- end }}
            {{- toYaml $res | nindent 12 }}
            {{- else if and .Values.sriovConfig.enabled (not .Values.network.hostNetwork) }}
            limits:
              {{ .Values.sriovConfig.extendedResourceName }}: {{ .Values.sriovConfig.vfCount | quote }}
            requests:
              {{ .Values.sriovConfig.extendedResourceName }}: {{ .Values.sriovConfig.vfCount | quote }}
          {{- end }}
          {{- end }}
          {{- if and .Values.sriovConfig .Values.sriovConfig.enabled }}
          env:
            - name: RESOURCE_EXTENDED
              value: {{ .Values.sriovConfig.extendedResourceName | quote }}
            - name: RU_LOG_FILE
              value: {{ .Values.config.log.filename | default (printf "%s/ru_em.log" .Values.persistence.mountPath) | quote }}
            - name: RU_PRESERVE_LOGS
              value: {{ .Values.persistence.preserveOldLogs | quote }}
          {{- else }}
          env:
            - name: RU_LOG_FILE
              value: {{ .Values.config.log.filename | default (printf "%s/ru_em.log" .Values.persistence.mountPath) | quote }}
            - name: RU_PRESERVE_LOGS
              value: {{ .Values.persistence.preserveOldLogs | quote }}
          {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
            - name: entrypoint-volume
              mountPath: /entrypoint
            {{- if .Values.persistence.enabled }}
            - name: logs-volume
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.config.dpdk }}
            - name: hugepage-1gi
              mountPath: /hugepages-1Gi
            {{- end }}
          command: [ "/entrypoint/entrypoint.sh" ]
          args: [ "/etc/config/ru_emulator.yaml" ]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
