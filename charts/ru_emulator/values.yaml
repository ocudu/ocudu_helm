# -- Number of pod replicas
# For load testing, increase this value
# @default -- `1` (single instance)
replicaCount: 1

# -- Container image configuration
image:
  # -- Container image repository
  repository: registry.gitlab.com/ocudu/ocudu/ocudu_nightly_avx512
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (overrides Chart appVersion if set)
  # @default -- Chart appVersion
  tag: 20260601_1a976144

# -- Image pull secrets for private registries
# @default -- `[]` (no pull secrets)
imagePullSecrets: []

# -- Override the name of the chart
# @default -- Chart name
nameOverride: ""

# -- Override the full name of resources
# @default -- Release name + chart name
fullnameOverride: ""

# -- ConfigMap name override
# Useful for pinning specific configuration via Terraform or GitOps
# Example:
# ```yaml
# configmap:
#   nameOverride: "ru-emu-config"
# ```
# @default -- `{}` (use generated name)
configmap: {}
# To pin a custom name (e.g., via Terraform --set):
# configmap:
#   nameOverride: "ru-emu-config"

# -- Additional pod annotations
# @default -- `{}` (no additional annotations)
podAnnotations: {}

# -- Extra labels applied to the Deployment and Pod template
# @default -- `{}` (no extra labels)
extraLabels: {}

# -- Pod-level security context. Runs the container as a non-root user by default.
# @default -- see below
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container-level security context.
#
# Default: minimum-privilege shape for SR-IOV Device Plugin + vfio-pci.
#
# REQUIREMENTS for this default to work:
#   1. Image must have file capabilities on /usr/local/bin/ru_emulator:
#        RUN setcap cap_sys_nice,cap_ipc_lock+ep /usr/local/bin/ru_emulator
#   2. Node's containerd must set `device_ownership_from_security_context = true`
#      so VFIO device nodes are chown'd to the pod's runAsUser/runAsGroup.
#   3. allowPrivilegeEscalation MUST be true for file caps to take effect.
securityContext:
  allowPrivilegeEscalation: true
  privileged: false
  capabilities:
    drop: ["ALL"]
    add:
      - SYS_NICE
      - IPC_LOCK

# -- Resource requests and limits
# Example:
# ```yaml
# resources:
#   limits:
#     cpu: 4
#     memory: 8Gi
#     hugepages-1Gi: 2Gi
#   requests:
#     cpu: 4
#     memory: 8Gi
#     hugepages-1Gi: 2Gi
# ```
# @default -- `{}` (no resource constraints)
resources: {}

# -- Node selector for pod assignment
# Schedule pods only on nodes with matching labels
# @default -- `{}` (no node selector)
nodeSelector: {}

# -- Tolerations for pod assignment
# Allows pods to be scheduled on nodes with matching taints
# @default -- `[]` (no tolerations)
tolerations: []

# -- Pod affinity configuration for advanced scheduling
# @default -- `{}` (no affinity rules)
affinity: {}

# -- Network configuration
network:
  # -- Enable host network mode for direct host network access
  # Disable this when using SR-IOV plugin
  hostNetwork: true

# -- SR-IOV configuration
# Provides high-performance network interfaces via SR-IOV Virtual Functions (VFs)
# When enabled, the entrypoint script automatically detects VF PCI address and MAC
sriovConfig:
  # -- Enable SR-IOV network device plugin
  # Requires SR-IOV device plugin deployed in cluster
  # When enabled, set network.hostNetwork: false
  enabled: false
  
  # -- Extended resource name from SR-IOV device plugin
  # This must match the resource name configured in your SR-IOV device plugin
  # Common values:
  #   - intel.com/intel_sriov_netdevice (Intel NICs)
  #   - mellanox.com/cx5_sriov_switchdev (Mellanox NICs)
  # Check available resources: kubectl get node <node-name> -o json | jq '.status.allocatable'
  extendedResourceName: "intel.com/intel_sriov_netdevice"
  
  # -- Number of SR-IOV VFs to request per pod
  # For single-cell emulator, typically 1
  # @default -- `1`
  vfCount: 1

# -- RU emulator configuration
# OpenFronthaul Radio Unit emulator settings
config:
  # -- Logging configuration
  log:
    # -- Log file path inside container
    filename: /tmp/ru_em.log
    # -- Log level (debug, info, warning, error)
    level: warning

  # -- DPDK configuration (optional)
  # Uncomment to customize DPDK EAL (Environment Abstraction Layer) arguments
  #dpdk:
  #  # EAL arguments for CPU core binding
  #  eal_args: "--lcores (0-1)@(0-15)"

  # -- RU emulator cell configuration
  ru_emu:
    # -- List of emulated RU cells
    # Each cell represents one OpenFronthaul connection to a DU
    cells:
    # -- Cell bandwidth in MHz
    - bandwidth: 100
      # -- Network interface name for OpenFronthaul traffic
      # Set to auto in case of DPDK with SRIOV plugin is enabled
      network_interface: enp4s0f0
      # -- MAC address of the RU (emulated device)
      ru_mac_addr: 50:7c:6f:45:44:33
      # -- MAC address of the DU (destination)
      du_mac_addr: 00:11:22:33:44:00
      # -- VLAN tag for traffic isolation
      vlan_tag: 6
      # -- Uplink port IDs for OpenFronthaul
      ul_port_id: [0]
      # -- Downlink port IDs for OpenFronthaul
      dl_port_id: [0]
      # -- PRACH port IDs for OpenFronthaul
      prach_port_id: [0]
      # -- Compression method for uplink IQ data
      # Options: none, bfp (block floating point), bfp_sel
      compr_method_ul: "bfp"
      # -- Compression bitwidth for uplink (1-16 bits)
      compr_bitwidth_ul: 9
      # -- Timing parameters for control-plane downlink
      t2a_max_cp_dl: 500
      t2a_min_cp_dl: 258
      # -- Timing parameters for control-plane uplink
      t2a_max_cp_ul: 500
      t2a_min_cp_ul: 285
      # -- Timing parameters for user-plane uplink
      t2a_max_up: 300
      t2a_min_up: 85
      # -- PRACH format (long or short)
      prach_format: "long"

# -- Persistent storage configuration
# The chart supports both PVC (with StorageClass) and hostPath storage for logs
persistence:
  # -- Enable persistent storage for logs
  # When disabled, logs are stored in ephemeral pod storage (lost on pod restart)
  # @default -- `true`
  enabled: true

  # -- Storage type: "pvc" or "hostPath"
  # - "pvc": Uses PersistentVolumeClaim with dynamic provisioning (recommended for cloud)
  # - "hostPath": Direct mount from host filesystem (recommended for bare-metal)
  # @default -- `hostPath`
  type: hostPath

  # -- PVC configuration (used when type is "pvc")
  pvc:
    # -- Storage class name for dynamic provisioning
    # Leave empty to use the cluster's default StorageClass
    # Check available: kubectl get storageclass
    # @default -- `""` (cluster default)
    storageClassName: ""

    # -- Access mode for the persistent volume
    # ReadWriteOnce: Volume can be mounted read-write by a single node
    # @default -- `ReadWriteOnce`
    accessMode: ReadWriteOnce

    # -- Storage size for the persistent volume
    # @default -- `10Gi`
    size: 10Gi

  # -- hostPath configuration (used when type is "hostPath")
  hostPath:
    # -- Path on the host node where logs will be stored
    # Ensure this path exists or can be created on worker nodes
    # @default -- `/mnt/debugging-logs`
    path: "/mnt/debugging-logs"

    # -- hostPath type (DirectoryOrCreate, Directory, etc.)
    # DirectoryOrCreate: Creates directory if it doesn't exist
    # @default -- `DirectoryOrCreate`
    type: DirectoryOrCreate

  # -- Mount path inside the container where logs are written
  # @default -- `/tmp`
  mountPath: "/tmp"

  # -- Preserve logs from previous runs (append mode)
  # When true, logs are appended; when false, logs are overwritten
  # @default -- `true`
  preserveOldLogs: true
