# -- Container image configuration
image:
  # -- Container image repository
  repository: registry.gitlab.com/ocudu/ocudu_elements/ocudu_helm/tuned
  # -- Image tag
  # @default -- Chart appVersion
  tag: "v2.21.0_1.0.0"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Name of the tuned profile to create and apply
profileName: srs-tuned

# -- Content of the tuned profile configuration file
# This example profile configures system parameters for low-latency RAN workloads including:
# - Bootloader kernel parameters (hugepages, IOMMU, CPU isolation)
# - CPU governor and performance settings
# - Kernel scheduler tuning
# - Network stack optimization
# - Virtual memory settings
profileContent: |
  #
  # Copyright 2021-2026 Software Radio Systems Limited
  # By using this file, you agree to the terms and conditions set
  # forth in the LICENSE file which can be found at the top level of
  # the distribution.
  #
  [main]
  summary=OCUDU tuned profile

  [bootloader]
  cmdline="nosoftlockup selinux=0 enforcing=0 nmi_watchdog=0 crashkernel=auto softlockup_panic=0 nosoftlockup audit=0 mce=off mitigations=off tsc=nowatchdog skew_tick=1 hugepagesz=1G hugepages=2 default_hugepagesz=1G amd_iommu=on iommu=pt"

  [cpu]
  energy_perf_bias=performance
  force_latency=cstate.id:1|99
  governor=performance
  min_perf_pct=100

  [script]
  script=${i:PROFILE_DIR}/startup.sh

  [sysctl]
  kernel.numa_balancing=0
  kernel.sched_min_granularity_ns=3000000
  kernel.sched_wakeup_granularity_ns=5000
  kernel.sched_migration_cost_ns=5000
  kernel.sched_rt_runtime_us=980000
  kernel.sched_nr_migrate=4
  net.core.busy_poll=50
  net.core.busy_read=50
  net.ipv4.tcp_fastopen=3
  vm.dirty_ratio=10
  vm.dirty_background_ratio=3
  vm.swappiness=10

  [vm]
  transparent_hugepages=never

# -- Content of the startup script executed by the tuned profile
# This script applies additional performance optimizations on system startup
startupScriptContent: |-
  #!/bin/bash
  #
  # Copyright 2021-2026 Software Radio Systems Limited
  # By using this file, you agree to the terms and conditions set
  # forth in the LICENSE file which can be found at the top level of
  # the distribution.
  #
  . /usr/lib/tuned/functions

  start() {
    # ocudu performance script
    echo N | tee /sys/module/drm_kms_helper/parameters/poll >/dev/null
    echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor >/dev/null
    return "$?"
  }

  stop() {
    return "$?"
  }

  process $@

# -- Pod affinity configuration for advanced scheduling
# @default -- `{}` (no affinity rules)
affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: kubernetes.io/hostname
  #         operator: In
  #         values:
  #         - hostname

# -- Tolerations for pod assignment
# Allows pods to be scheduled on nodes with matching taints
# @default -- `[]` (no tolerations)
tolerations: []
#   - key: "node-role.kubernetes.io/master"
#     operator: "Exists"
#     effect: "NoSchedule"
#

# -- Host path to the tuned directory
# This directory contains tuned daemon configuration and profiles
hostPathTuned: /usr/lib/tuned

# -- Node selector for pod assignment
# Schedule pods only on nodes with matching labels
# @default -- `{}` (no node selector)
nodeSelector: {}
  # kubernetes.io/hostname: hostname

# -- Security context for the container
# Tuned requires privileged access to modify system parameters
securityContext:
  # -- Run container in privileged mode (required for system tuning)
  privileged: true

# -- Resource requests and limits
# @default -- `{}` (no resource constraints)
resources: {}

# -- Additional pod annotations
# @default -- `{}` (no additional annotations)
annotations: {}

# -- Restart DaemonSet pods when configuration changes
# Set to true to automatically apply profile changes on update
restartOnConfigChange: true

# -- Automatic reboot configuration after profile application
# Some tuned profile changes (especially bootloader parameters) require a reboot
reboot:
  # -- Enable automatic system reboot after profile is applied
  enabled: true
  # -- Command to execute for system reboot
  # Uses shutdown with 1-minute delay to allow graceful shutdown
  cmd: "/sbin/shutdown -r +1 'tuned profile applied by helm'"
  # -- Directory to store reboot marker files
  # Used to track which nodes have been rebooted
  markerDir: /var/lib/tuned-helm
